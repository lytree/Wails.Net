# ============================================================================
# Wails.Net GitLab CI/CD 配置
# ----------------------------------------------------------------------------
# 流水线阶段：restore → build → test → pack → dist → publish
#
# 运行环境要求：
#   - Windows runner（tags: windows）用于构建全部项目与 Windows 测试
#   - Linux runner（tags: linux）用于运行 Linux 平台测试（需 GTK4 原生库）
#
# 版本号管理：
#   版本号集中在 Directory.Build.props 的 WailsNetVersion 属性中维护。
#   发布新版本时，修改 WailsNetVersion 后打 Git tag（如 v0.1.0-alpha.1），
#   触发 publish 阶段推送 NuGet 包到 nuget.org。
#
# 统一 SDK（Wails.Net.Sdk）：
#   - multi-target net10.0;net10.0-windows10.0.19041.0，根据 TFM 自动选择平台 Bundle
#   - 包含 build/ props/targets，消费者自动导入平台相关 MSBuild 属性
#   - pack 阶段会验证 build/ 目录已正确打包到 nupkg
#
# 多 RID 自包含构建：
#   - dist 阶段调用 BuildAll.fsx，通过 --rid all 一键构建该平台全部架构
#   - Windows: win-x64, win-x86, win-arm64（主构建，必须成功）
#   - Linux:   linux-x64, linux-arm64（交叉编译，允许失败）
#   - Android: android-arm64, android-x64, android-arm（需 Android SDK，允许失败）
# ============================================================================

stages:
  - restore
  - build
  - test
  - pack
  - dist
  - publish

variables:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  # 标记为 CI 构建，启用 ContinuousIntegrationBuild 与确定性构建
  CI: "true"
  # 解决方案文件
  SOLUTION: "Wails.Net.slnx"
  # 打包输出目录
  PACKAGE_OUTPUT: "artifacts/packages"
  # 自包含构建产物目录
  DIST_OUTPUT: "artifacts/dist"

# 缓存 NuGet 全局包缓存
cache:
  key:
    files:
      - Directory.Packages.props
    prefix: nuget-$CI_COMMIT_REF_SLUG
  paths:
    - .nuget/packages/
  policy: pull-push

# ============================================================================
# 阶段 1：还原 NuGet 包
# ============================================================================
restore:
  stage: restore
  tags:
    - windows
  script:
    - dotnet restore $SOLUTION
  artifacts:
    paths:
      - "**/obj/project.assets.json"
      - "**/obj/*.csproj.nuget.*"
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ============================================================================
# 阶段 2：构建（Windows runner 构建全部项目，包括 Linux 平台项目）
# ============================================================================
build:
  stage: build
  tags:
    - windows
  needs:
    - restore
  script:
    - dotnet build $SOLUTION -c Release --no-restore -p:SkipFrontendBuild=true
  artifacts:
    paths:
      - "src/**/bin/Release/"
      - "tests/**/bin/Release/"
    exclude:
      - "src/**/*.nupkg"
      - "src/**/*.snupkg"
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ============================================================================
# 阶段 3：测试
# ============================================================================
# 跨平台测试（Application + CLI），在 Windows runner 上运行
test:application:
  stage: test
  tags:
    - windows
  needs:
    - build
  script:
    # Application 测试（TUnit，使用 dotnet run 而非 dotnet test）
    - dotnet run --project tests/Wails.Net.Application.Tests/Wails.Net.Application.Tests.csproj --no-build -c Release
    # CLI 测试
    - dotnet run --project tests/Wails.Net.Cli.Tests/Wails.Net.Cli.Tests.csproj --no-build -c Release
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Windows 平台测试（依赖 Win32 API、注册表、WinForms 剪贴板）
test:windows:
  stage: test
  tags:
    - windows
  needs:
    - build
  script:
    - dotnet run --project tests/Wails.Net.Application.Windows.Tests/Wails.Net.Application.Windows.Tests.csproj --no-build -c Release
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Linux 平台测试（依赖 GirCore/GTK4 原生库，需在 Linux runner 上运行）
test:linux:
  stage: test
  tags:
    - linux
  needs:
    - build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  before_script:
    # 安装 GTK4 + WebKitGTK 6.0 原生库（Debian/Ubuntu 系）
    - apt-get update -y
    - apt-get install -y libgtk-4-1 libwebkitgtk-6.0-4 || apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
    - dotnet restore $SOLUTION
  script:
    # 在 Linux 上重新构建 Linux 平台项目（之前的构建在 Windows 上完成）
    - dotnet build tests/Wails.Net.Application.Linux.Tests/Wails.Net.Application.Linux.Tests.csproj -c Release
    - dotnet run --project tests/Wails.Net.Application.Linux.Tests/Wails.Net.Application.Linux.Tests.csproj --no-build -c Release
  allow_failure: true  # Linux 原生库环境可能不稳定，允许失败
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ============================================================================
# 阶段 4：打包 NuGet 包
# ============================================================================
pack:
  stage: pack
  tags:
    - windows
  needs:
    - test:application
    - test:windows
  script:
    - New-Item -ItemType Directory -Force -Path $PACKAGE_OUTPUT
    # 打包所有 src/ 下的可发布项目（slnx 包含 Bundle.Windows / Bundle.Linux / Sdk）
    - dotnet pack $SOLUTION -c Release --no-build -o $PACKAGE_OUTPUT -p:SkipFrontendBuild=true
    # 单独打包 Templates 项目
    # Templates 不在 slnx 中（dotnet pack 会因 NU5017 误报退出码 1，但 nupkg 实际正确生成）
    - $templatesExit = 0
    - dotnet pack src/Wails.Net.Templates/Wails.Net.Templates.csproj -c Release -o $PACKAGE_OUTPUT
    - if ($LASTEXITCODE -ne 0) { $templatesExit = $LASTEXITCODE; Write-Host "Templates 打包返回非零退出码 $templatesExit（NU5017 误报，nupkg 已生成）" }
    # 验证 Templates nupkg 实际生成
    - $templatesPkg = Get-ChildItem $PACKAGE_OUTPUT -Filter "Wails.Net.Templates.*.nupkg" -ErrorAction SilentlyContinue
    - if (-not $templatesPkg) { Write-Host "错误：Templates 包未生成"; exit 1 }
    - Write-Host "Templates 包已生成: $($templatesPkg.Name)"
    # 验证统一 SDK 包（Wails.Net.Sdk）已生成且包含 build/ 目录
    - $sdkPkg = Get-ChildItem $PACKAGE_OUTPUT -Filter "Wails.Net.Sdk.*.nupkg" -ErrorAction SilentlyContinue | Select-Object -First 1
    - if (-not $sdkPkg) { Write-Host "错误：Wails.Net.Sdk 包未生成"; exit 1 }
    - Write-Host "Wails.Net.Sdk 包已生成: $($sdkPkg.Name)"
    # 解压 nupkg（zip 格式）验证 build/ 目录存在
    - $sdkTempDir = Join-Path $env:TEMP "sdk-verify-$(Get-Random)"
    - New-Item -ItemType Directory -Force -Path $sdkTempDir | Out-Null
    - Copy-Item $sdkPkg.FullName -Destination (Join-Path $sdkTempDir "sdk.zip")
    - Expand-Archive -Path (Join-Path $sdkTempDir "sdk.zip") -DestinationPath $sdkTempDir -Force
    - $sdkBuildDir = Join-Path $sdkTempDir "build"
    - if (-not (Test-Path $sdkBuildDir)) { Write-Host "错误：Wails.Net.Sdk 包未包含 build/ 目录"; exit 1 }
    - $buildFiles = Get-ChildItem $sdkBuildDir -Recurse
    - Write-Host "Wails.Net.Sdk build/ 目录验证通过，包含 $($buildFiles.Count) 个文件:"
    - $buildFiles | Format-Table Name, FullName
    - Remove-Item -Recurse -Force $sdkTempDir
    # 列出生成的包
    - Get-ChildItem $PACKAGE_OUTPUT -Filter "*.nupkg" | Format-Table Name, Length
  artifacts:
    paths:
      - $PACKAGE_OUTPUT/*.nupkg
      - $PACKAGE_OUTPUT/*.snupkg
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============================================================================
# 阶段 5：三平台自包含构建（Windows / Linux / Android）
# ============================================================================
# 调用 BuildAll.fsx 统一构建脚本，通过 --rid all 一键构建该平台全部架构。
# 生成自包含可执行文件，无需终端用户安装 .NET 运行时。
#   - Windows: win-x64, win-x86, win-arm64 → .exe + .zip
#   - Linux:   linux-x64, linux-arm64     → 二进制 + .tar.gz
#   - Android: android-arm64, android-x64, android-arm → .apk
dist:windows:
  stage: dist
  tags:
    - windows
  needs:
    - pack
  script:
    - New-Item -ItemType Directory -Force -Path $DIST_OUTPUT
    # 调用 BuildAll.fsx 构建 Windows 全部 RID（win-x64, win-x86, win-arm64）
    - dotnet fsi scripts/build/BuildAll.fsx -- --platform windows --rid all --configuration Release --output $DIST_OUTPUT --skip-frontend
    - Get-ChildItem $DIST_OUTPUT/windows -Recurse | Format-Table FullName, Length
  artifacts:
    paths:
      - $DIST_OUTPUT/windows/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

dist:linux:
  stage: dist
  tags:
    - windows
  needs:
    - pack
  script:
    - New-Item -ItemType Directory -Force -Path $DIST_OUTPUT
    # 调用 BuildAll.fsx 交叉编译 Linux 全部 RID（linux-x64, linux-arm64）
    - dotnet fsi scripts/build/BuildAll.fsx -- --platform linux --rid all --configuration Release --output $DIST_OUTPUT --skip-frontend
    - Get-ChildItem $DIST_OUTPUT/linux -Recurse | Format-Table FullName, Length
  artifacts:
    paths:
      - $DIST_OUTPUT/linux/
    expire_in: 7 days
  allow_failure: true  # Linux 在 Windows runner 上交叉编译可能失败
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

dist:android:
  stage: dist
  tags:
    - windows
  needs:
    - pack
  script:
    - New-Item -ItemType Directory -Force -Path $DIST_OUTPUT
    # 调用 BuildAll.fsx 构建 Android 全部 RID（android-arm64, android-x64, android-arm）
    - dotnet fsi scripts/build/BuildAll.fsx -- --platform android --rid all --configuration Release --output $DIST_OUTPUT --skip-frontend
    - Get-ChildItem $DIST_OUTPUT/android -Recurse | Format-Table FullName, Length
  artifacts:
    paths:
      - $DIST_OUTPUT/android/
    expire_in: 7 days
  allow_failure: true  # Android 构建需要完整 Android SDK 配置
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============================================================================
# 阶段 6：发布到 NuGet.org（仅 tag 触发）
# ============================================================================
# 遍历所有生成的 nupkg 推送到 nuget.org，包括：
#   - Wails.Net.Application（核心运行时）
#   - Wails.Net.Bundle.Windows / Linux / Android（平台 Bundle）
#   - Wails.Net.Sdk（统一 SDK 聚合包，自动选择平台）
#   - Wails.Net.Templates（项目模板）
publish:nuget:
  stage: publish
  tags:
    - windows
  needs:
    - pack
  script:
    - |
      Get-ChildItem $PACKAGE_OUTPUT -Filter "*.nupkg" | ForEach-Object {
        Write-Host "推送包: $($_.Name)"
        dotnet nuget push $_.FullName --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
      }
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: on_success
  environment:
    name: nuget-org
    url: https://www.nuget.org/packages/Wails.Net.Sdk
