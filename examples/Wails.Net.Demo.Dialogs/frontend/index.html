<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wails.Net Demo - Dialogs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>💬 对话框</h1>
            <p class="subtitle">Wails.Net Demo - DialogPlugin 原生对话框</p>
        </header>
        <main class="content">
            <section class="card">
                <h2>消息类对话框</h2>
                <div class="form-group">
                    <button id="messageBtn">dialog.message（信息）</button>
                    <button id="warningBtn">dialog.warning（警告）</button>
                    <button id="errorBtn" class="danger">dialog.error（错误）</button>
                </div>
                <div class="form-group">
                    <button id="questionBtn">dialog.question（询问）</button>
                    <span class="hint">返回 1=Yes, 0=No</span>
                </div>
                <div id="messageResult" class="result"></div>
            </section>

            <section class="card">
                <h2>文件类对话框</h2>
                <div class="form-group">
                    <button id="openFileBtn">dialog.openFile</button>
                    <button id="openMultipleBtn">dialog.openMultipleFiles</button>
                </div>
                <div class="form-group">
                    <button id="saveFileBtn">dialog.saveFile</button>
                </div>
                <div id="fileResult" class="result"></div>
            </section>

            <section class="card">
                <h2>操作历史</h2>
                <div class="form-group">
                    <button id="refreshHistoryBtn">刷新历史</button>
                    <button id="clearHistoryBtn" class="danger">清空历史</button>
                </div>
                <table class="history-table">
                    <thead>
                        <tr><th>序号</th><th>动作</th><th>结果</th><th>时间</th></tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="4" class="empty">（暂无记录）</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
